<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工匠工具箱 — CraftBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elevated: #141414;
      --bg-card: #1a1a1a;
      --fg: #e8e4dd;
      --fg-muted: #7a756d;
      --accent: #c9a84c;
      --accent-glow: rgba(201, 168, 76, 0.15);
      --border: #2a2723;
      --border-accent: #3d3529;
      --radius: 12px;
      --font-display: 'Playfair Display', 'Noto Serif SC', serif;
      --font-body: 'Noto Serif SC', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 48px 0 40px;
      text-align: center;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: var(--accent);
    }

    .header h1 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 3rem;
      letter-spacing: 0.02em;
      color: var(--fg);
      line-height: 1.1;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header .subtitle {
      color: var(--fg-muted);
      font-size: 0.95rem;
      margin-top: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Tools Grid */
    .tools-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 32px 96px;
    }

    .section-label {
      font-size: 0.75rem;
      color: var(--fg-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .tool-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .tool-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tool-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .tool-card:hover::before {
      opacity: 1;
    }

    .tool-icon {
      font-size: 2.2rem;
      margin-bottom: 16px;
      display: block;
    }

    .tool-card h3 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--fg);
    }

    .tool-card p {
      color: var(--fg-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .tool-tag {
      display: inline-block;
      margin-top: 16px;
      padding: 4px 12px;
      border: 1px solid var(--border-accent);
      border-radius: 99px;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px;
      color: var(--fg-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tool-card {
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }

    .tool-card:nth-child(1) { animation-delay: 0.1s; }
    .tool-card:nth-child(2) { animation-delay: 0.2s; }
    .tool-card:nth-child(3) { animation-delay: 0.3s; }
    .tool-card:nth-child(4) { animation-delay: 0.4s; }

    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .tools-grid { grid-template-columns: 1fr; }
      .tools-section { padding: 40px 20px 64px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Craft<span>Box</span></h1>
    <p class="subtitle">工匠工具箱 · 小而美的在线工具集</p>
  </header>

  <main class="tools-section">
    <div class="section-label">可用工具</div>
    <div class="tools-grid">
      <a class="tool-card" href="/toolbox/tools/wechat-formatter.html">
        <span class="tool-icon">✒️</span>
        <h3>公众号排版器</h3>
        <p>Markdown 一键转微信公众号格式，多主题可选，支持代码块、表格、脚注引用，复制即用。</p>
        <span class="tool-tag">Markdown → WeChat</span>
      </a>

      <a class="tool-card" href="#" style="opacity: 0.4; cursor: default; pointer-events: none;">
        <span class="tool-icon">🔤</span>
        <h3>更多工具</h3>
        <p>即将上线 — 你想要什么工具，告诉我，我来造。</p>
        <span class="tool-tag">Coming Soon</span>
      </a>
    </div>
  </main>

  <footer class="footer">
    CraftBox · 工匠工具箱 — 由 <a href="#">宙斯</a> 精心打造
  </footer>
</body>
</html>
